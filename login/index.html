<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT Login</title>
<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
    --error: #f87171;
}

* { box-sizing: border-box; }

body {
    margin:0;
    font-family:'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container {
    width: 360px;
    padding: 2.5rem 2rem;
    border-radius:16px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    text-align:center;
}

.login-container h1 {
    margin-bottom:1.5rem;
    font-size:1.75rem;
    font-weight:500;
}

.login-container input {
    width:100%;
    padding:12px;
    margin-bottom:1rem;
    border-radius:8px;
    border:1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size:1rem;
    transition: all 0.2s;
}

.login-container input:focus {
    outline:none;
    border-color: var(--primary);
    box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

.login-container button {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    background: var(--primary);
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition: all 0.2s ease;
}

.login-container button:hover {
    transform: translateY(-1px);
}

.message {
    margin-top:1rem;
    font-size:0.9rem;
    color: var(--error);
}
</style>
</head>
<body>

<div class="login-container">
    <h1>Login to access XSINT</h1>
    <input type="text" id="keyInput" placeholder="Enter your login key" />
    <button id="loginBtn">Login</button>
    <div class="message" id="message"></div>
</div>

<script>
const messageDiv = document.getElementById('message');
const keyInput = document.getElementById('keyInput');

// Auto-redirect if key already in localStorage
const storedKey = localStorage.getItem('xsintKey');
if (storedKey) {
    window.location.href = `/dashboard?auth=${storedKey}`;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
    const key = keyInput.value.trim();
    if (!key) {
        messageDiv.textContent = "Please enter a key.";
        return;
    }

    messageDiv.textContent = "Checking key...";
    
    try {
        const res = await fetch(`https://api.xsint.space/user/accountinfo?key=${encodeURIComponent(key)}`);
        if (!res.ok) throw new Error("Network error");
        const data = await res.json();

        if (data.exist === false) {
            messageDiv.textContent = "Invalid key.";
        } else {
            // Valid key
            localStorage.setItem('xsintKey', key);
            window.location.href = `/dashboard?auth=${key}`;
        }
    } catch(err) {
        console.error(err);
        messageDiv.textContent = "Could not validate key. Try again.";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Page</title>
<style>
    body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .account-container {
        display: flex;
        background: #1f2937;
        border-radius: 12px;
        overflow: hidden;
        width: 800px;
        max-width: 95%;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .account-info {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .info-item {
        margin-bottom: 20px;
        font-size: 18px;
    }
    .logout-btn {
        padding: 12px 20px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }
    .logout-btn:hover {
        background: #dc2626;
    }
    .account-logo {
        flex: 1;
        background: #111827;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .account-logo img {
        max-width: 80%;
        max-height: 80%;
        border-radius: 50%;
    }
</style>
</head>
<body>
<div class="account-container">
    <div class="account-info">
        <div>
            <div class="info-item" id="createdDate">Account Created: </div>
            <div class="info-item" id="tier">Tier: </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="account-logo">
        <img id="logoImg" src="default-logo.png" alt="Account Logo">
    </div>
</div>

<script>
    const apiBase = 'https://api.xsint.space/user/accountinfo';
    const savedKey = localStorage.getItem('xsintKey');

    if (!savedKey) {
        // No key, redirect to 403
        window.location.href = '/403.html';
    } else {
        fetch(`${apiBase}?key=${savedKey}`)
            .then(res => {
                if (!res.ok) throw new Error('API request failed');
                return res.json();
            })
            .then(data => {
                document.getElementById('createdDate').textContent = "Account Created: " + (data.createdDate || "");
                document.getElementById('tier').textContent = "Tier: " + (data.tier || "");
                document.getElementById('logoImg').src = data.logoUrl || 'default-logo.png';
            })
            .catch(err => {
                console.warn("API request failed, showing empty account info.", err);
                // Empty values are already default, just leave them
            });
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('xsintKey');
        window.location.href = '/login';
    });
</script>
</body>
</html>

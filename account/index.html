<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT Account</title>

<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
}

* { box-sizing: border-box; }

body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    backdrop-filter: blur(12px);
    background: rgba(2,6,23,0.6);
    border-bottom:1px solid var(--border);
}

.logo { height:30px; }

.top-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

.credits {
    padding:6px 12px;
    border-radius:999px;
    background: rgba(59,130,246,0.15);
    border:1px solid rgba(59,130,246,0.3);
    color:#60a5fa;
    font-size:13px;
}

.nav a {
    color: var(--muted);
    text-decoration:none;
    margin:0 8px;
    transition:0.2s;
}
.nav a:hover { color:white; }

.account { 
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(148,163,184,0.08);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
    margin: 0; 
    padding: 0;
}

.account:hover {
    background: rgba(59,130,246,0.15);
    border-color: rgba(59,130,246,0.4);
    transform: translateY(-1px);
}

.account .icon {
    width:16px;
    height:16px;
    margin:0;
    display:block;
    fill: currentColor;
}

.account:hover .icon {
    fill:#60a5fa;
}

.main {
    display:flex;
    justify-content:center;
    padding:80px 20px;
}

.account-container {
    display:flex;
    width:700px;
    max-width:95%;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.account-info {
    flex:1;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.info-item {
    margin-bottom:20px;
    font-size:16px;
    color: var(--text);
}

.logout-btn {
    padding:12px 20px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition: all 0.2s ease;
}
.logout-btn:hover { background:#dc2626; }

.account-logo {
    flex:1;
    background: rgba(2,6,23,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}
.account-logo img {
    max-width:70%;
    max-height:70%;
    border-radius:50%;
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <img src="../assets/xsintlogo.png" class="logo">
    <div class="top-right">
        <div class="credits" id="credits">Credits: 0</div>
        <div class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/plans">Pricing</a>
            <a href="/support">Support</a>
            <a href="/api">API</a>
        </div>
        <div class="account" onclick="window.location.href='/account'">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
        </div>
    </div>
</div>

<!-- Main content -->
<div class="main">
    <div class="account-container">
        <div class="account-info">
            <div>
                <div class="info-item" id="createdDate">Account Created: </div>
                <div class="info-item" id="tier">Tier: </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
        <div class="account-logo">
            <img id="logoImg" src="../assets/xsintlogo.png" alt="Account Logo">
        </div>
    </div>
</div>

<script>
function getKey() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('auth') || localStorage.getItem('xsintKey');
}

const API_KEY = getKey();
if (!API_KEY) { window.location.href = '/403'; }

async function loadCreditsAndInfo() {
    try {
        const res = await fetch(`https://api.xsint.space/user/accountinfo?key=${API_KEY}`);
        const data = await res.json();

        // Update credits
        document.getElementById("credits").innerText = `Credits: ${data.credits || 0}`;

        // Update account info
        document.getElementById('createdDate').textContent = "Account Created: " + (data.createdDate || "");
        document.getElementById('tier').textContent = "Tier: " + (data.tier || "");
        document.getElementById('logoImg').src = data.logoUrl || '../assets/xsintlogo.png';

        // Save key to localStorage if coming from URL
        const urlKey = new URLSearchParams(window.location.search).get('auth');
        if (urlKey && urlKey !== localStorage.getItem('xsintKey')) {
            localStorage.setItem('xsintKey', urlKey);
        }

        window.history.replaceState({}, document.title, window.location.pathname);

    } catch (err) {
        console.warn("Failed to fetch account info.", err);
    }
}

loadCreditsAndInfo();

document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('xsintKey');
    window.location.href = '/login';
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT Dashboard</title>
<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
}

* { box-sizing: border-box; }
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: var(--text);
}

.topbar {
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    backdrop-filter: blur(12px);
    background: rgba(2,6,23,0.6);
    border-bottom:1px solid var(--border);
}

.logo { height:30px; }

.top-right { display:flex; align-items:center; gap:18px; }

.credits {
    padding:6px 12px;
    border-radius:999px;
    background: rgba(59,130,246,0.15);
    border:1px solid rgba(59,130,246,0.3);
    color:#60a5fa;
    font-size:13px;
}

.nav a {
    color: var(--muted);
    text-decoration:none;
    margin:0 8px;
    transition:0.2s;
}
.nav a:hover { color:white; }

.container { display:flex; }

.sidebar {
    width:230px;
    padding:20px 10px;
    border-right:1px solid var(--border);
}

.tool {
    display:flex;
    align-items:center;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    cursor:pointer;
    color:var(--muted);
    transition: all 0.2s ease;
}

.tool:hover {
    background: rgba(59,130,246,0.1);
    color:white;
    transform: translateX(4px);
}

.tool.active {
    background: rgba(59,130,246,0.15);
    color:white;
}

.icon { width:16px; height:16px; margin-right:10px; fill:currentColor; }

.main {
    flex:1;
    display:flex;
    justify-content:center;
    padding:60px 20px;
}

.card {
    width:600px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
}

h2 { margin-bottom:20px; font-weight:500; }

.input-group {
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#020617;
    color:white;
    transition:0.2s;
}

input:focus {
    outline:none;
    border-color: var(--primary);
    box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

button {
    padding:12px 18px;
    border-radius:8px;
    border:none;
    background: var(--primary);
    color:white;
    cursor:pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
}

.result-card {
    margin-top:20px;
    background: rgba(2,6,23,0.7);
    border:1px solid var(--border);
    border-radius:10px;
    padding:15px;
    font-size:13px;
    color: var(--muted);
}

.spinner {
    margin:20px auto;
    width:30px;
    height:30px;
    border:3px solid #1e293b;
    border-top:3px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }

@keyframes fadeIn {
    from { opacity:0; transform:translateY(10px);} 
    to { opacity:1; transform:translateY(0);} 
}

</style>
</head>
<body>

<div class="topbar">
    <img src="../assets/xsintlogo.png" class="logo">
    <div class="top-right">
        <div class="credits" id="credits">Credits: 0</div>
        <div class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/plans">Pricing</a>
            <a href="/support">Support</a>
            <a href="/api">API</a>
        </div>
    </div>
</div>

<div class="container">
<div class="sidebar">
    <div class="tool" onclick="loadTool(event,'username')">Username</div>
    <div class="tool" onclick="loadTool(event,'email')">Email</div>
    <div class="tool" onclick="loadTool(event,'phone')">Phone</div>
    <div class="tool" onclick="loadTool(event,'github')">GitHub</div>
    <div class="tool" onclick="loadTool(event,'ip')">IP</div>
    <div class="tool" onclick="loadTool(event,'website')">Website</div>
</div>

<div class="main">
    <div id="content"></div>
</div>
</div>

<script>
function getKeyFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('auth');
}

let API_KEY = getKeyFromURL() || localStorage.getItem('xsintKey');

function handleAuth() {
    if (!API_KEY) {
        window.location.href = '/403';
        return false;
    }
    const urlKey = getKeyFromURL();
    if (urlKey && urlKey !== localStorage.getItem('xsintKey')) {
        localStorage.setItem('xsintKey', urlKey);
    }
    window.history.replaceState({}, document.title, window.location.pathname);
    return true;
}

if (!handleAuth()) { throw new Error('Unauthorized'); }

async function loadCredits() {
    try {
        const res = await fetch(`https://api.xsint.space/user?key=${API_KEY}`);
        const data = await res.json();
        document.getElementById("credits").innerText = `Credits: ${data.credits || 0}`;
    } catch {
        document.getElementById("credits").innerText = "Credits: 0";
    }
}

function loadTool(event, type) {
    document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const titles = {
        username: "Username Intelligence",
        email: "Email Intelligence",
        phone: "Phone Intelligence",
        github: "GitHub Intelligence",
        ip: "IP Intelligence",
        website: "Website Intelligence"
    };

    document.getElementById("content").innerHTML = `
        <div class="card">
            <h2>${titles[type]}</h2>
            <div class="input-group">
                <input id="input" placeholder="Enter ${type}" onkeydown="handleEnter(event, '${type}')" />
                <button onclick="search('${type}')">Search</button>
            </div>
            <div id="result"></div>
        </div>
    `;
}

function handleEnter(e, type) {
    if (e.key === 'Enter') search(type);
}

async function search(type) {
    const input = document.getElementById("input").value;
    const resultBox = document.getElementById("result");
    resultBox.innerHTML = '<div class="spinner"></div>';

    try {
        const res = await fetch(`https://api.xsint.space/search?method=${type}&query=${encodeURIComponent(input)}&key=${API_KEY}`);
        const data = await res.json();

        resultBox.innerHTML = `
            <div class="result-card">
                <strong>Query:</strong> ${input}<br><br>
                <strong>Response:</strong>
                <pre style="white-space:pre-wrap; margin-top:10px;">${JSON.stringify(data, null, 2)}</pre>
            </div>
        `;

        loadCredits();
    } catch {
        resultBox.innerHTML = '<div class="result-card">Request failed.</div>';
    }
}

// Initial load
loadCredits();
window.onload = () => {
    const firstTool = document.querySelector('.tool');
    if (firstTool) firstTool.click();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT Dashboard</title>
<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
}

* { box-sizing: border-box; }
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: #020617;
    color: var(--text);
}

.topbar {
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    backdrop-filter: blur(12px);
    background: rgba(2,6,23,0.6);
    border-bottom:1px solid var(--border);
}

.logo { height:30px; }

.top-right {
    display: flex;
    align-items: center;   /* vertically centers all children */
    gap: 20px;
}

.credits {
    padding:6px 12px;
    border-radius:999px;
    background: rgba(59,130,246,0.15);
    border:1px solid rgba(59,130,246,0.3);
    color:#60a5fa;
    font-size:13px;
}

.nav a {
    color: var(--muted);
    text-decoration:none;
    margin:0 8px;
    transition:0.2s;
}
.nav a:hover { color:white; }

.container { display:flex; }

.sidebar {
    width:230px;
    padding:20px 10px;
    border-right:1px solid var(--border);
}

.tool {
    display:flex;
    align-items:center;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    cursor:pointer;
    color:var(--muted);
    transition: all 0.2s ease;
}

.tool:hover {
    background: rgba(59,130,246,0.1);
    color:white;
    transform: translateX(4px);
}

.tool.active {
    background: rgba(59,130,246,0.15);
    color:white;
}

.icon { width:16px; height:16px; margin-right:10px; fill:currentColor; }

.main {
    flex:1;
    display:flex;
    justify-content:center;
    padding:60px 20px;
}

.card {
    width:600px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
}

h2 { margin-bottom:20px; font-weight:500; }

.input-group {
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#020617;
    color:white;
    transition:0.2s;
}

input:focus {
    outline:none;
    border-color: var(--primary);
    box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

button {
    padding:12px 18px;
    border-radius:8px;
    border:none;
    background: var(--primary);
    color:white;
    cursor:pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
}

.result-card {
    margin-top:20px;
    background: rgba(2,6,23,0.7);
    border:1px solid var(--border);
    border-radius:10px;
    padding:15px;
    font-size:13px;
    color: var(--muted);
}

.spinner {
    margin:20px auto;
    width:30px;
    height:30px;
    border:3px solid #1e293b;
    border-top:3px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.account {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(148,163,184,0.08);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
    margin: 0;  /* important */
    padding: 0; /* important */
}

/* Hover effect */
.account:hover {
    background: rgba(59,130,246,0.15);
    border-color: rgba(59,130,246,0.4);
    transform: translateY(-1px);
}

/* Icon reacts too */
.account:hover .icon {
    fill: #60a5fa;
}

.account .icon {
    margin: 0;           /* remove any side spacing */
    display: block;      /* removes inline svg offsets */
}

@keyframes spin { to { transform:rotate(360deg);} }

@keyframes fadeIn {
    from { opacity:0; transform:translateY(10px);} 
    to { opacity:1; transform:translateY(0);} 
}

</style>
</head>
<body>

<div class="topbar">
    <img src="../assets/xsintlogo.png" class="logo">
    <div class="top-right">
        <div class="credits" id="credits">Credits: 0</div>
        <div class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/plans">Pricing</a>
            <a href="/support">Support</a>
            <a href="/api">API</a>
        </div>
        <div class="account" onclick="window.location.href='/account'">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
        </div>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="tool" onclick="loadTool(event,'username')">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
            Username
        </div>

        <div class="tool" onclick="loadTool(event,'email')">
            <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
                <polyline points="3,5 12,13 21,5" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Email
        </div>

        <div class="tool" onclick="loadTool(event,'phone')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M6.5 2h11a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="17.5" r="1" fill="currentColor"/>
            </svg>
            Phone
        </div>

        <div class="tool" onclick="loadTool(event,'github')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 .5C5.7.5.8 5.4.8 11.7c0 5 3.2 9.3 7.6 10.8.6.1.8-.3.8-.6v-2.2c-3.1.7-3.7-1.3-3.7-1.3-.5-1.2-1.2-1.6-1.2-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1.8 1.8 2.7 1.3.1-.7.4-1.3.7-1.6-2.5-.3-5.2-1.3-5.2-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C16.9 3 18 3.3 18 3.3c.6 1.7.2 2.9.1 3.2.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.3.8 1 .8 2v3c0 .3.2.7.8.6 4.4-1.5 7.6-5.8 7.6-10.8C23.2 5.4 18.3.5 12 .5z"/>
            </svg>
            GitHub
        </div>

        <div class="tool" onclick="loadTool(event,'ip')">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="2" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="2"/>
                <line x1="14" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/>
                <line x1="12" y1="2" x2="12" y2="10" stroke="currentColor" stroke-width="2"/>
                <line x1="12" y1="14" x2="12" y2="22" stroke="currentColor" stroke-width="2"/>
            </svg>
            IP
        </div>

        <div class="tool" onclick="loadTool(event,'website')">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2c3.3 3.3 3.3 18.7 0 22" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2c-3.3 3.3-3.3 18.7 0 22" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Website
        </div>
    </div>

    <div class="main">
        <div id="content"></div>
    </div>
</div>

</body>
</html>

<script>
function getKeyFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('auth');
}

let API_KEY = getKeyFromURL() || localStorage.getItem('xsintKey');

function handleAuth() {
    if (!API_KEY) {
        window.location.href = '/403';
        return false;
    }
    const urlKey = getKeyFromURL();
    if (urlKey && urlKey !== localStorage.getItem('xsintKey')) {
        localStorage.setItem('xsintKey', urlKey);
    }
    window.history.replaceState({}, document.title, window.location.pathname);
    return true;
}

if (!handleAuth()) { throw new Error('Unauthorized'); }

async function loadCredits() {
    try {
        const res = await fetch(`https://api.xsint.space/user?key=${API_KEY}`);
        const data = await res.json();
        document.getElementById("credits").innerText = `Credits: ${data.credits || 0}`;
    } catch {
        document.getElementById("credits").innerText = "Credits: 0";
    }
}

function loadTool(event, type) {
    document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const titles = {
        username: "Username Intelligence",
        email: "Email Intelligence",
        phone: "Phone Intelligence",
        github: "GitHub Intelligence",
        ip: "IP Intelligence",
        website: "Website Intelligence"
    };

    document.getElementById("content").innerHTML = `
        <div class="card">
            <h2>${titles[type]}</h2>
            <div class="input-group">
                <input id="input" placeholder="Enter ${type}" onkeydown="handleEnter(event, '${type}')" />
                <button onclick="search('${type}')">Search</button>
            </div>
            <div id="result"></div>
        </div>
    `;
}

function handleEnter(e, type) {
    if (e.key === 'Enter') search(type);
}

async function search(type) {
    const input = document.getElementById("input").value;
    const resultBox = document.getElementById("result");
    resultBox.innerHTML = '<div class="spinner"></div>';

    try {
        const res = await fetch(`https://api.xsint.space/search?method=${type}&query=${encodeURIComponent(input)}&key=${API_KEY}`);
        const data = await res.json();

        const message = data.data && data.data.trim() !== "" 
            ? data.data 
            : "No results found.";

        resultBox.innerHTML = `
            <div class="result-card">
                <strong>Query:</strong> ${input}<br><br>
                <strong>Response:</strong>
                <pre style="white-space:pre-wrap; margin-top:10px;">${message}</pre>
            </div>
        `;

        loadCredits();
    } catch {
        resultBox.innerHTML = '<div class="result-card">Request failed.</div>';
    }
}

// Initial load
loadCredits();
window.onload = () => {
    const firstTool = document.querySelector('.tool');
    if (firstTool) firstTool.click();
};
</script>

</body>
</html>

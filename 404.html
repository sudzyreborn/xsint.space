<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found</title>
<style>
    body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
    }

    .code {
        font-size: 120px;
        font-weight: 700;
        color: #2563eb;
        margin-bottom: 10px;
    }

    h1 {
        font-weight: 500;
        margin-bottom: 10px;
    }

    p {
        color: #9ca3af;
        margin-bottom: 30px;
    }

    a {
        display: inline-block;
        padding: 12px 20px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.2s;
    }

    a:hover {
        background: #1d4ed8;
    }
</style>
</head>
<body>

<div class="container">
    <div class="code">404</div>
    <h1>Not Found</h1>
    <p>The requested resource was not found</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>

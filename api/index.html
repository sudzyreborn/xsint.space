<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT API</title>
<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
}

body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* TOPBAR */
.topbar {
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    backdrop-filter: blur(12px);
    background: rgba(2,6,23,0.6);
    border-bottom:1px solid var(--border);
}

.logo { height:30px; }

.top-right {
    display:flex;
    align-items:center;
    gap:20px;
}

.credits {
    padding:6px 12px;
    border-radius:999px;
    background: rgba(59,130,246,0.15);
    border:1px solid rgba(59,130,246,0.3);
    color:#60a5fa;
    font-size:13px;
}

.nav a {
    color: var(--muted);
    text-decoration:none;
    margin:0 8px;
}
.nav a:hover { color:white; }

/* MAIN */
.main {
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 60px);
}

.card {
    width:520px;
    text-align:center;
    background: var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px;
}

/* KEY BOX */
.key-box {
    margin:20px 0;
    padding:18px;
    border-radius:10px;
    background:#020617;
    border:1px solid var(--border);
    font-family: monospace;
    font-size:14px;
    word-break: break-all;
}

/* BUTTONS ROW */
.actions {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
}

button {
    padding:10px 14px;
    border-radius:8px;
    border:none;
    background: var(--primary);
    color:white;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
}

button.disabled {
    background: rgba(59,130,246,0.4);
    cursor:not-allowed;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.2s;
}

.modal.active {
    opacity:1;
    pointer-events:auto;
}

.modal-box {
    background:#020617;
    padding:25px;
    border-radius:12px;
    border:1px solid var(--border);
    text-align:center;
}

.modal-buttons {
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.spinner {
    margin:20px auto;
    width:30px;
    height:30px;
    border:3px solid #1e293b;
    border-top:3px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }
</style>
</head>

<body>

<div class="topbar">
    <img src="../assets/xsintlogo.png" class="logo">
    <div class="top-right">
        <div class="credits" id="credits">Credits: 0</div>
        <div class="nav">
            <a href="/login">Dashboard</a>
            <a href="/plans">Pricing</a>
            <a href="/support">Support</a>
            <a href="/api">API</a>
        </div>
    </div>
</div>

<div class="main">
    <div class="card">
        <h2>Your API Key</h2>

        <div id="keyBox" class="key-box">
            <div class="spinner"></div>
        </div>

        <div class="actions">
            <button onclick="openModal()">Cycle Key</button>
            <button onclick="copyKey()">Copy</button>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Are you sure?</h3>
        <p>This will reset your API key</p>

        <div class="modal-buttons">
            <button onclick="confirmCycle()">Yes</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
let API_KEY = localStorage.getItem("xsintKey");
let REAL_KEY = "";
let hidden = true;
let cooldown = false;

if (!API_KEY) window.location.href = "/login";

/* INIT */
async function init() {
    try {
        const res = await fetch(`https://api.xsint.space/user/accountinfo?key=${API_KEY}`);
        const data = await res.json();

        if (!data || data.error) return window.location.href = "/403";
        
        console.log("Tier value:", JSON.stringify(data.tier));
        
        if (!data.tier || data.tier.trim().toLowerCase() !== "enterprise") {
            window.location.href = "/noaccess";
            return;
        }

        document.getElementById("credits").innerText = `Credits: ${data.credits || 0}`;

        loadApiKey();
    } catch {
        window.location.href = "/403";
    }
}

/* LOAD KEY */
async function loadApiKey() {
    try {
        const res = await fetch(`https://api.xsint.space/user/apikey?key=${API_KEY}`);
        const data = await res.json();

        REAL_KEY = data.apiKey || "";
        renderKey();
    } catch {
        document.getElementById("keyBox").innerText = "An error occured fetching API key";
    }
}

/* SHOW / HIDE */
function renderKey() {
    const box = document.getElementById("keyBox");
    if (hidden) {
        box.innerText = "•".repeat(REAL_KEY.length);
    } else {
        box.innerText = REAL_KEY;
    }
}

function toggleKey() {
    hidden = !hidden;
    renderKey();
}

/* COPY */
function copyKey() {
    navigator.clipboard.writeText(REAL_KEY);
    alert("Copied!");
}

/* MODAL */
function openModal() {
    document.getElementById("modal").classList.add("active");
}
function closeModal() {
    document.getElementById("modal").classList.remove("active");
}

/* CYCLE */
async function confirmCycle() {
    closeModal();

    if (cooldown) return;

    const btn = document.getElementById("cycleBtn");
    btn.classList.add("disabled");
    cooldown = true;

    try {
        const res = await fetch(`https://api.xsint.space/user/cyclekey?key=${API_KEY}`);
        const data = await res.json();

        REAL_KEY = data.newKey || "";
        renderKey();
    } catch {
        alert("Failed");
    }

    setTimeout(() => {
        cooldown = false;
        btn.classList.remove("disabled");
    }, 5000);
}

init();
</script>

</body>
</html>

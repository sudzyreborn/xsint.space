<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSINT API</title>
<link rel="icon" type="image/png" href="../assets/xsintlogo.png" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.7);
    --border: rgba(148, 163, 184, 0.1);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #3b82f6;
}

* { box-sizing: border-box; }

body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* TOPBAR (same as yours) */
.topbar {
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    backdrop-filter: blur(12px);
    background: rgba(2,6,23,0.6);
    border-bottom:1px solid var(--border);
}

.logo { height:30px; }

.top-right {
    display:flex;
    align-items:center;
    gap:20px;
}

.credits {
    padding:6px 12px;
    border-radius:999px;
    background: rgba(59,130,246,0.15);
    border:1px solid rgba(59,130,246,0.3);
    color:#60a5fa;
    font-size:13px;
}

.nav a {
    color: var(--muted);
    text-decoration:none;
    margin:0 8px;
    transition:0.2s;
}
.nav a:hover { color:white; }

.account {
    display:flex;
    align-items:center;
    justify-content:center;
    width:32px;
    height:32px;
    border-radius:8px;
    background: rgba(148,163,184,0.08);
    border:1px solid var(--border);
    cursor:pointer;
}

.account:hover {
    background: rgba(59,130,246,0.15);
}

/* MAIN */
.main {
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 60px);
}

.card {
    width:500px;
    text-align:center;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* API KEY DISPLAY */
.key-box {
    margin:20px 0;
    padding:18px;
    border-radius:10px;
    background:#020617;
    border:1px solid var(--border);
    font-family: monospace;
    font-size:14px;
    word-break: break-all;
}

/* BUTTON */
button {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:auto;
    padding:12px 18px;
    border-radius:8px;
    border:none;
    background: var(--primary);
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform: translateY(-1px);
}

/* spinner */
.spinner {
    margin:20px auto;
    width:30px;
    height:30px;
    border:3px solid #1e293b;
    border-top:3px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }
</style>
</head>

<body>

<div class="topbar">
    <img src="../assets/xsintlogo.png" class="logo">
    <div class="top-right">
        <div class="credits" id="credits">Credits: 0</div>
        <div class="nav">
            <a href="/login">Dashboard</a>
            <a href="/plans">Pricing</a>
            <a href="/support">Support</a>
            <a href="/api">API</a>
        </div>
        <div class="account" onclick="window.location.href='/account'">
            <svg viewBox="0 0 24 24" width="16" height="16">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
        </div>
    </div>
</div>

<div class="main">
    <div class="card">
        <h2>Your API Key</h2>

        <div id="keyBox" class="key-box">
            <div class="spinner"></div>
        </div>

        <button onclick="cycleKey()">
            <!-- refresh icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M21 12a9 9 0 1 1-3-6.7" stroke="white" stroke-width="2"/>
                <polyline points="21 3 21 9 15 9" stroke="white" stroke-width="2"/>
            </svg>
            Cycle Key
        </button>
    </div>
</div>

<script>
let API_KEY = localStorage.getItem("xsintKey");

/* AUTH CHECK */
if (!API_KEY) {
    window.location.href = "/login";
}

/* LOAD ACCOUNT */
async function init() {
    try {
        const res = await fetch(`https://api.xsint.space/user/accountinfo?key=${API_KEY}`);
        const data = await res.json();

        if (!data || data.error) {
            window.location.href = "/403";
            return;
        }

        if (data.tier !== "enterprise") {
            window.location.href = "/noaccess";
            return;
        }

        document.getElementById("credits").innerText =
            `Credits: ${data.credits || 0}`;

        loadApiKey();

    } catch {
        window.location.href = "/403";
    }
}

/* LOAD API KEY */
async function loadApiKey() {
    try {
        const res = await fetch(`https://api.xsint.space/user/apikey?key=${API_KEY}`);
        const data = await res.json();

        document.getElementById("keyBox").innerText =
            data.apiKey || "Failed to load key";

    } catch {
        document.getElementById("keyBox").innerText = "Error loading key";
    }
}

/* CYCLE KEY */
async function cycleKey() {
    const box = document.getElementById("keyBox");
    box.innerHTML = '<div class="spinner"></div>';

    try {
        const res = await fetch(`https://api.xsint.space/user/cyclekey?key=${API_KEY}`);
        const data = await res.json();

        box.innerText = data.newKey || "Failed to cycle key";

    } catch {
        box.innerText = "Error cycling key";
    }
}

init();
</script>

</body>
</html>

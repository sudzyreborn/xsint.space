<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XSINT - OSINT Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f1115;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin-top: 80px;
        }

        .logo {
            width: 120px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 3px;
        }

        .search-types {
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .type-btn {
            padding: 10px 18px;
            border: 1px solid #2f3136;
            background-color: #1c1f26;
            color: #aaa;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .type-btn.active {
            background-color: #5865f2;
            color: white;
            border-color: #5865f2;
        }

        .type-btn:hover {
            background-color: #2c2f36;
        }

        .search-bar {
            display: flex;
            margin-top: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px;
            border: none;
            outline: none;
            background-color: #1c1f26;
            color: white;
            font-size: 16px;
            border-radius: 6px 0 0 6px;
        }

        .search-bar button {
            padding: 14px 22px;
            border: none;
            background-color: #5865f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 6px 6px 0;
            transition: 0.2s;
        }

        .search-bar button:hover {
            background-color: #4752c4;
        }

        .results {
            margin-top: 30px;
            text-align: left;
            background-color: #1c1f26;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }

        .loading {
            margin-top: 20px;
            color: #5865f2;
            display: none;
        }

        .error {
            margin-top: 20px;
            color: #ff4d4d;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" class="logo" alt="XSINT Logo">
        <h1>XSINT</h1>

        <div class="search-types">
            <div class="type-btn active" onclick="setType(this, 'phone')">Phone</div>
            <div class="type-btn" onclick="setType(this, 'discord')">Discord</div>
            <div class="type-btn" onclick="setType(this, 'github')">GitHub</div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Enter phone number...">
            <button onclick="performSearch()">Search</button>
        </div>

        <div class="loading" id="loading">Searching...</div>
        <div class="error" id="error"></div>
        <div class="results" id="results"></div>
    </div>

<script>
    let currentType = "phone";

    function setType(element, type) {
        document.querySelectorAll(".type-btn").forEach(btn => {
            btn.classList.remove("active");
        });

        element.classList.add("active");
        currentType = type;

        const input = document.getElementById("searchInput");
        if (type === "phone") input.placeholder = "Enter phone number...";
        if (type === "discord") input.placeholder = "Enter Discord ID / Username...";
        if (type === "github") input.placeholder = "Enter GitHub username...";
    }

    async function performSearch() {
        const query = document.getElementById("searchInput").value.trim();
        const resultsBox = document.getElementById("results");
        const loading = document.getElementById("loading");
        const errorBox = document.getElementById("error");

        if (!query) {
            alert("Please enter a value.");
            return;
        }

        resultsBox.style.display = "none";
        errorBox.style.display = "none";
        loading.style.display = "block";

        try {
            const response = await fetch(`https://api.xsint.space/lookup?type=${currentType}&value=${encodeURIComponent(query)}`);
            
            if (!response.ok) {
                throw new Error("API returned an error.");
            }

            const data = await response.json();

            resultsBox.textContent = JSON.stringify(data, null, 4);
            resultsBox.style.display = "block";
        } catch (error) {
            errorBox.textContent = "Error: " + error.message;
            errorBox.style.display = "block";
        } finally {
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
